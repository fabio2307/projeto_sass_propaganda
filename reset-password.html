<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Redefinir senha</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 24px 70px rgba(0,0,0,0.22);
        }
        h1 {
            margin: 0 0 16px;
            font-size: 28px;
        }
        p {
            color: #94a3b8;
            margin: 0 0 24px;
            line-height: 1.5;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            margin-bottom: 14px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .password-container {
            position: relative;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
        }
        .password-container input {
            flex: 1;
            margin: 0;
            padding-right: 45px;
        }
        .password-container .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: color 0.2s ease;
        }
        .password-container .toggle-password:hover {
            color: #e2e8f0;
        }
        .password-container .toggle-password.active {
            color: #3b82f6;
        }
        .password-container .eye-icon {
            width: 18px;
            height: 18px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        button {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .link {
            margin-top: 18px;
            display: block;
            color: #38bdf8;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }
        .message {
            margin-top: 18px;
            font-size: 14px;
            color: #f8fafc;
        }
        .message.error {
            color: #fecaca;
        }
        .message.success {
            color: #86efac;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Redefinir senha</h1>
        <p>Insira sua nova senha. Ela deve ter pelo menos 8 caracteres e incluir letras maiúsculas, minúsculas, dígitos e símbolos.</p>
        <div class="password-container">
            <input id="password" type="password" placeholder="Nova senha" autocomplete="new-password" />
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>
        <div class="password-container">
            <input id="confirmPassword" type="password" placeholder="Repita a nova senha" autocomplete="new-password" />
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>
        <button id="submitBtn">Salvar senha</button>
        <p id="message" class="message"></p>
        <a class="link" href="/index.html">Voltar ao login</a>
    </div>

    <script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = event.target.closest('.toggle-password');

            if (input.type === "password") {
                input.type = "text";
                button.classList.add("active");
            } else {
                input.type = "password";
                button.classList.remove("active");
            }
        }

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const message = document.getElementById('message');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const button = document.getElementById('submitBtn');

        if (!token) {
            message.textContent = 'Token de redefinição ausente. Use o link enviado para seu email.';
            message.classList.add('error');
            button.disabled = true;
        }

        button.addEventListener('click', async () => {
            message.textContent = '';
            message.className = 'message';

            const password = passwordInput.value.trim();
            const confirmPassword = confirmInput.value.trim();

            if (!password || password.length < 8) {
                message.textContent = 'Senha deve ter ao menos 8 caracteres.';
                message.classList.add('error');
                return;
            }
            if (password !== confirmPassword) {
                message.textContent = 'As senhas não coincidem.';
                message.classList.add('error');
                return;
            }

            button.disabled = true;
            button.textContent = 'Salvando...';

            try {
                const res = await fetch('/api?action=resetPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Erro ao redefinir senha');
                }

                message.textContent = 'Senha redefinida com sucesso! Faça login novamente.';
                message.classList.add('success');
                button.textContent = 'Salvo';
                
                // Limpar campos após sucesso
                passwordInput.value = '';
                confirmInput.value = '';
            } catch (err) {
                message.textContent = err.message;
                message.classList.add('error');
                button.disabled = false;
                button.textContent = 'Salvar senha';
            }
        });
    </script>
</body>
</html>
