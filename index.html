<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ads SaaS</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- LOGIN -->
    <div class="center-box" id="loginBox">
        <h2>Login</h2>

        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" type="password" placeholder="Senha">

        <button id="btnLogin">Entrar</button>

        <p id="resendBox" class="resend hidden">
            Não recebeu o email?
            <span id="resendBtn" onclick="resendVerification()">Reenviar verificação</span>
        </p>

        <p onclick="showRegister()" class="link">Criar conta</p>
    </div>
    <div class="center-box hidden" id="registerBox">
        <h2>Cadastro</h2>

        <form id="formRegister" onsubmit="event.preventDefault(); register();">

            <input id="registerName" type="text" placeholder="Nome" required>

            <input id="registerBirth" type="date" required onchange="calcularIdade()">

            <input id="registerAge" type="number" placeholder="Idade" readonly>

            <input id="registerEmail" type="email" placeholder="Email" required>

            <input id="registerPassword" type="password" placeholder="Senha" required>

            <button type="submit">Cadastrar</button>

        </form>

        <p onclick="showLogin()" class="link">Já tenho conta</p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">

        <div class="topbar">
            <h2>Dashboard</h2>

            <div class="menu">
                <a href="/dashboard.html" class="btn">📊 Dashboard</a>
                <a href="/ads.html" class="btn">🔥 Ver anúncios</a>
                <button onclick="logout()" class="btn-logout">🚪 Sair</button>
            </div>
        </div>

        <!-- SALDO -->
        <div class="saldo-box">
            <h3>💰 Saldo: R$ <span id="saldo">0</span></h3>

            <input type="text" id="valor" placeholder="R$ 0,00">
            <button onclick="pagar()">Adicionar saldo</button>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="card">
                <span>Total Ads</span>
                <h3 id="totalAds">0</h3>
            </div>

            <div class="card">
                <span>Cliques</span>
                <h3 id="totalClicks">0</h3>
            </div>

            <div class="card">
                <span>Views</span>
                <h3 id="totalViews">0</h3>
            </div>
        </div>

        <!-- FILTRO DE ANÚNCIOS -->
        <div class="filter-section">
            <input id="searchAds" type="text" placeholder="Buscar anúncios..." oninput="filtrarAds()">
        </div>

        <div class="dashboard-content">

            <!-- CRIAR ANÚNCIO -->
            <div class="create-ad">
                <h3>Cadastrar Produto / Anúncio</h3>

                <input id="title" placeholder="Título do produto">
                <input id="description" placeholder="Descrição">
                <input id="link" placeholder="Link do produto">
                <input id="bid" type="text" placeholder="R$ 0,00">

                <div class="input-group">
                    <label for="budget">Orçamento total</label>

                    <div class="money-input">
                        <span>R$</span>
                        <input id="budget" type="text" placeholder="0,00" oninput="formatMoneyInput(this)"
                            onblur="validateBudget(this)">
                    </div>

                    <small>Valor total que será usado na campanha</small>
                </div>

                <button onclick="criarAd()">Criar anúncio</button>
            </div>

            <!-- LISTA -->
            <div class="ads" id="ads"></div>

            <!-- TRANSAÇÕES -->
            <div class="transactions-section">
                <h3>Histórico de Transações</h3>
                <button onclick="carregarTransacoes()">Carregar Transações</button>
                <div id="transactions"></div>
            </div>

        </div>

    </div>

    <script src="./app.js"></script>

</body>

</html>
