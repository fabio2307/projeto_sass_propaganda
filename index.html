<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ads SaaS</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- LOGIN -->
    <div class="center-box">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Senha">

        <button onclick="login()">Entrar</button>
        <button onclick="register()">Cadastrar</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">

        <div class="topbar">
            <h2>Dashboard</h2>
            <button onclick="logout()">Sair</button>
        </div>

        <!-- 🔥 FORMULÁRIO DE CRIAÇÃO -->
        <div class="create-ad">
            <h3>Criar Anúncio</h3>

            <input id="title" placeholder="Título">
            <input id="description" placeholder="Descrição">
            <input id="link" placeholder="Link">
            <input id="bid" placeholder="Valor do lance">

            <button onclick="criarAd()">Criar Anúncio</button>
        </div>

        <!-- LISTA DE ADS -->
        <div class="ads" id="ads"></div>

    </div>

    <script src="./app.js"></script>

</body>

</html>
