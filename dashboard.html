<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="topbar">
        <h2>📊 Meu Dashboard</h2>

        <div class="menu">
            <a href="/index.html" class="btn">➕ Criar anúncio</a>
            <a href="/ads.html" class="btn">🔥 Anúncios</a>
            <button onclick="logout()" class="btn-logout">🚪 Sair</button>
        </div>
    </div>

    <div class="dashboard">

        <div class="card">
            <h3>💰 Saldo Disponível</h3>
            <p id="balance">...</p>
        </div>

        <div class="card">
            <h3>📉 Total Gasto (Mês)</h3>
            <p id="spent">...</p>
        </div>

        <div class="card">
            <h3>🖱 Total de Cliques</h3>
            <p id="clicks">...</p>
        </div>

        <div class="card">
            <h3>💸 CPC Médio</h3>
            <p id="cpc">...</p>
        </div>

        <div class="card">
            <h3>📊 CTR Médio</h3>
            <p id="ctr">...</p>
        </div>

        <div class="card">
            <h3>🎯 Conversões</h3>
            <p id="conversions">...</p>
        </div>

    </div>

    <div class="charts-container">
        <div class="chart-card">
            <h3>Desempenho por Dia</h3>
            <canvas id="performanceChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>Distribuição de Gastos</h3>
            <canvas id="spendingChart"></canvas>
        </div>
    </div>

    <h3 style="padding:20px;">📢 Meus Anúncios</h3>
    <div class="ads-table" id="adsTable"></div>

    <!-- Carrega dados do dashboard -->
    <script>
        const API = "/api";

        async function carregarDashboard() {

            const token = localStorage.getItem("token");

            if (!token) {
                window.location.href = "/index.html";
                return;
            }

            const res = await fetch(`${API}?action=dashboard`, {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            const data = await res.json();

            // Métricas básicas
            document.getElementById("balance").innerText =
                data.balance.toLocaleString("pt-BR", {
                    style: "currency",
                    currency: "BRL"
                });

            document.getElementById("spent").innerText =
                data.totalSpent.toLocaleString("pt-BR", {
                    style: "currency",
                    currency: "BRL"
                });

            document.getElementById("clicks").innerText = data.totalClicks || 0;
            document.getElementById("cpc").innerText =
                (data.cpc || 0).toLocaleString("pt-BR", {
                    style: "currency",
                    currency: "BRL"
                });

            // Novas métricas
            const totalViews = data.ads?.reduce((acc, ad) => acc + (ad.views || 0), 0) || 0;
            const ctr = totalViews > 0 ? ((data.totalClicks / totalViews) * 100).toFixed(2) : 0;
            document.getElementById("ctr").innerText = `${ctr}%`;

            // Simulando conversões (em produção, teria dados reais)
            const conversions = Math.floor(data.totalClicks * 0.05); // 5% de conversão
            document.getElementById("conversions").innerText = conversions;

            renderAdsTable(data.ads);
            renderCharts(data.ads);
        }

        function renderAdsTable(ads) {
            const container = document.getElementById("adsTable");

            if (!ads || ads.length === 0) {
                container.innerHTML = "<p>Nenhum anúncio encontrado.</p>";
                return;
            }

            const table = `
                <table class="ads-table-content">
                    <thead>
                        <tr>
                            <th>Anúncio</th>
                            <th>Status</th>
                            <th>Visualizações</th>
                            <th>Cliques</th>
                            <th>CTR</th>
                            <th>CPC</th>
                            <th>Gasto</th>
                            <th>Orçamento</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${ads.map(ad => {
                            const ctr = ad.views > 0 ? ((ad.clicks / ad.views) * 100).toFixed(2) : 0;
                            const cpc = ad.clicks > 0 ? (ad.spent / ad.clicks).toFixed(2) : 0;
                            return `
                                <tr>
                                    <td>${ad.title}</td>
                                    <td><span class="status-${ad.status}">${ad.status}</span></td>
                                    <td>${ad.views || 0}</td>
                                    <td>${ad.clicks || 0}</td>
                                    <td>${ctr}%</td>
                                    <td>R$ ${cpc}</td>
                                    <td>R$ ${(ad.spent || 0).toFixed(2)}</td>
                                    <td>R$ ${(ad.budget || 0).toFixed(2)}</td>
                                </tr>
                            `;
                        }).join("")}
                    </tbody>
                </table>
            `;

            container.innerHTML = table;
        }

        function renderCharts(ads) {
            // Gráfico de desempenho por dia (simulado)
            const ctx1 = document.getElementById('performanceChart').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'],
                    datasets: [{
                        label: 'Cliques',
                        data: [12, 19, 3, 5, 2, 3, 9],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4
                    }, {
                        label: 'Visualizações',
                        data: [120, 190, 30, 50, 20, 30, 90],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' }
                    }
                }
            });

            // Gráfico de distribuição de gastos
            const ctx2 = document.getElementById('spendingChart').getContext('2d');
            const adLabels = ads?.map(ad => ad.title.substring(0, 20) + '...') || [];
            const adSpent = ads?.map(ad => ad.spent || 0) || [];

            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: adLabels,
                    datasets: [{
                        data: adSpent,
                        backgroundColor: [
                            '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'right' }
                    }
                }
            });
        }

        carregarDashboard();
    </script>

    <!-- Logout simples -->
    <script>
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/ads.html";
        }
    </script>

</body>

</html>
