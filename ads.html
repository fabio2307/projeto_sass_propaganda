<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Anúncios</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="topbar">
        <h2>🔥 Anúncios</h2>

        <div class="menu">
            <a href="/index.html" class="btn">➕ Criar anúncio</a>
            <a href="/dashboard.html" class="btn">📊 Dashboard</a>
        </div>
    </div>

    <div class="ads" id="ads"></div>

    <script>
        const API = "/api";

        function showToast(message) {
            let container = document.getElementById("toastContainer");

            if (!container) {
                container = document.createElement("div");
                container.id = "toastContainer";
                container.style.position = "fixed";
                container.style.right = "20px";
                container.style.top = "20px";
                container.style.zIndex = "9999";
                document.body.appendChild(container);
            }

            const toast = document.createElement("div");
            toast.innerText = message;
            toast.style.padding = "12px 18px";
            toast.style.marginTop = "10px";
            toast.style.borderRadius = "10px";
            toast.style.background = "rgba(15, 23, 42, 0.95)";
            toast.style.color = "#fff";
            toast.style.boxShadow = "0 12px 24px rgba(0,0,0,0.16)";
            toast.style.opacity = "0";
            toast.style.transition = "opacity 0.2s ease";
            container.appendChild(toast);

            requestAnimationFrame(() => {
                toast.style.opacity = "1";
            });

            setTimeout(() => {
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 🔥 CARREGA ANÚNCIOS
        async function carregarAdsPublicos() {
            try {
                const res = await fetch(`${API}?action=listAds`);
                const data = await res.json();

                console.log("API resposta:", data);

                if (!Array.isArray(data)) {
                    document.getElementById("ads").innerHTML =
                        "<p>Erro ao carregar anúncios</p>";
                    console.error("Erro da API:", data);
                    return;
                }

                if (data.length === 0) {
                    document.getElementById("ads").innerHTML =
                        "<p>Nenhum anúncio disponível</p>";
                    return;
                }

                renderAds(data);

            } catch (err) {
                console.error(err);
                document.getElementById("ads").innerHTML =
                    "<p>Erro de conexão</p>";
            }
        }

        // 🔥 RENDERIZA ANÚNCIOS
        function renderAds(ads) {
            const container = document.getElementById("ads");

            container.innerHTML = ads.map(ad => {
                const ctr = ad.views > 0
                    ? ((ad.clicks / ad.views) * 100).toFixed(1)
                    : 0;

                return `
                <div class="ad-card">

                    <h3>${ad.title}</h3>

                    <p>${ad.description || "Sem descrição"}</p>

                    <a href="${ad.link}" target="_blank"
                       onclick="registrarClick('${ad.id}')">
                        🔗 Ver oferta
                    </a>

                    <div class="ad-metrics">
                    <span>👁 ${ad.views} visualizações</span>
                    <span>🖱 ${ad.clicks} cliques</span>
                    <span>📊 ${ctr}% de engajamento</span>
                    </div>

                    <!-- 🔥 Destaque baseado no bid (sem mostrar valor) -->
                    ${ad.bid >= 100 ? `<div class="premium">💎 Premium</div>` : ""}
                    ${ad.bid >= 50 && ad.bid < 100 ? `<div class="badge">🔥 Destaque</div>` : ""}

                </div>
                `;
            }).join("");
        }

        // 🔥 REGISTRA CLIQUE
        async function registrarClick(adId) {
            try {
                const res = await fetch(`${API}?action=click`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ adId })
                });

                const data = await res.json();

                if (data.paused) {
                    showToast("Anúncio pausado por saldo insuficiente");
                }

            } catch (err) {
                console.error("Erro ao registrar clique");
            }
        }

        // 🚀 INICIA
        carregarAdsPublicos();
    </script>

</body>

</html>
